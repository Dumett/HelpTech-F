{% extends "base.html" %}

{% block content %}
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Iniciar Sesión</h1>
        </div>
    </section>

    <!-- Login Form -->
    <section class="main-content">
        <div class="container">
            <div style="max-width: 400px; margin: 0 auto;">
                <form method="POST" action="{{ url_for('login') }}" style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email:</label>
                        <input type="email" name="email" value="{{ email if email else '' }}" class="form-control" placeholder="tu@ejemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Contraseña:</label>
                        <input type="password" name="password" class="form-control" placeholder="Tu contraseña" required>
                    </div>
                    
                    <button type="submit" style="padding: 12px; background: #4DA6FF; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">INICIAR SESIÓN</button>
                </form>
                <p style="text-align: center; margin-top: 20px;">
                    <a href="{{ url_for('register') }}" style="color: #4DA6FF; text-decoration: underline;">¿No tienes cuenta? Regístrate</a>
                </p>
            </div>
        </div>
    </section>
{% endblock %}
