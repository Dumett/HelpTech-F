{% extends "base.html" %}

{% block content %}
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Registrar Nuevo Producto</h1>
        </div>
    </section>

    <!-- Form Section -->
    <section class="main-content">
        <div class="container">
            <div class="form-container">
                <div class="card">
                    <form method="POST" action="{{ url_for('add_product') }}" class="form">
                        <div class="form-grid">
                            <div class="form-group">
                                <label for="code">CÓDIGO DEL PRODUCTO *</label>
                                <input type="text" id="code" name="code" value="{{ code if code else '' }}" 
                                       class="form-control" placeholder="Ej: PROD-001" required>
                            </div>

                            <div class="form-group">
                                <label for="name">NOMBRE DEL PRODUCTO *</label>
                                <input type="text" id="name" name="name" value="{{ name if name else '' }}" 
                                       class="form-control" placeholder="Ej: Laptop Dell XPS 13" required>
                            </div>

                            <div class="form-group full-width">
                                <label for="description">DESCRIPCIÓN</label>
                                <textarea id="description" name="description" rows="3" 
                                          class="form-control" placeholder="Descripción detallada del producto">{{ description if description else '' }}</textarea>
                            </div>

                            <div class="form-group">
                                <label for="category">CATEGORÍA</label>
                                <input type="text" id="category" name="category" value="{{ category if category else '' }}" 
                                       class="form-control" placeholder="Ej: Electrónica, Ropa, Alimentos">
                            </div>

                            <div class="form-group">
                                <label for="unit_price">PRECIO UNITARIO ($) *</label>
                                <input type="number" id="unit_price" name="unit_price" value="{{ unit_price if unit_price else '0' }}" 
                                       step="0.01" min="0" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="stock">STOCK INICIAL *</label>
                                <input type="number" id="stock" name="stock" value="{{ stock if stock else '0' }}" 
                                       min="0" class="form-control" required>
                            </div>

                            <div class="form-group">
                                <label for="tax_rate">TASA DE IMPUESTO (%) *</label>
                                <input type="number" id="tax_rate" name="tax_rate" value="{{ tax_rate if tax_rate else '0' }}" 
                                       step="0.01" min="0" max="100" class="form-control" required>
                                <small class="form-text">Porcentaje de impuesto que aplica al producto</small>
                            </div>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="btn-submit" style="background: #2ecc71;">
                                REGISTRAR PRODUCTO
                            </button>
                            <a href="{{ url_for('product_management') }}" class="btn-cancel">
                                CANCELAR
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </section>
{% endblock %}
