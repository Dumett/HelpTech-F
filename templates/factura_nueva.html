<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nueva Factura - HelpTech-F</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .producto-item {
            background: #f9f9f9;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .producto-info {
            flex: 1;
        }
        .producto-cantidad {
            width: 100px;
            margin: 0 10px;
        }
        .producto-precio {
            font-weight: bold;
            color: #667eea;
            min-width: 100px;
        }
        .btn-eliminar {
            background: #c33;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            width: auto;
        }
        .total-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            text-align: right;
            margin-top: 20px;
        }
        .producto-agregar {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        #producto-select {
            flex: 2;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
        #cantidad {
            width: 100px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="logo">HelpTech-F</div>
        <div class="nav-links">
            <a href="{{ url_for('dashboard') }}">Dashboard</a>
            <a href="{{ url_for('listar_clientes') }}">Clientes</a>
            <a href="{{ url_for('listar_productos') }}">Productos</a>
            <a href="{{ url_for('listar_facturas') }}">Facturas</a>
            <a href="{{ url_for('logout') }}">Cerrar Sesión</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Nueva Factura</h2>
            
            <div class="form-group">
                <label for="cliente">Cliente *</label>
                <select id="cliente" required style="width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px;">
                    <option value="">Seleccionar cliente</option>
                    {% for cliente in clientes %}
                    <option value="{{ cliente[0] }}">{{ cliente[1] }} - {{ cliente[2] or 'Sin documento' }}</option>
                    {% endfor %}
                </select>
            </div>
            
            <h3>Agregar Productos</h3>
            <div class="producto-agregar">
                <select id="producto-select">
                    <option value="">Seleccionar producto</option>
                    {% for producto in productos %}
                    <option value="{{ producto[0] }}" data-precio="{{ producto[2] }}" data-nombre="{{ producto[1] }}">
                        {{ producto[1] }} - ${{ '{:,.2f}'.format(producto[2]) }} (Stock: {{ producto[3] }})
                    </option>
                    {% endfor %}
                </select>
                <input type="number" id="cantidad" placeholder="Cantidad" value="1" min="1">
                <button type="button" onclick="agregarProducto()" class="btn" style="width: auto;">Agregar</button>
            </div>
            
            <div id="productos-lista">
                <p>No hay productos agregados</p>
            </div>
            
            <div class="total-box">
                <p><strong>Subtotal:</strong> $<span id="subtotal">0.00</span></p>
                <p><strong>IVA ({{ iva }}%):</strong> $<span id="iva-total">0.00</span></p>
                <p style="font-size: 1.2em;"><strong>TOTAL:</strong> $<span id="total">0.00</span></p>
            </div>
            
            <button type="button" onclick="crearFactura()" class="btn">Generar Factura</button>
        </div>
    </div>

    <script>
        let productosSeleccionados = [];
        
        function agregarProducto() {
            const select = document.getElementById('producto-select');
            const productoId = select.value;
            const cantidad = parseInt(document.getElementById('cantidad').value);
            
            if (!productoId) {
                alert('Seleccione un producto');
                return;
            }
            
            if (cantidad < 1) {
                alert('La cantidad debe ser mayor a 0');
                return;
            }
            
            const producto = {
                id: parseInt(productoId),
                nombre: select.options[select.selectedIndex].getAttribute('data-nombre'),
                precio: parseFloat(select.options[select.selectedIndex].getAttribute('data-precio')),
                cantidad: cantidad
            };
            
            // Verificar si el producto ya está en la lista
            const existente = productosSeleccionados.find(p => p.id === producto.id);
            if (existente) {
                existente.cantidad += cantidad;
            } else {
                productosSeleccionados.push(producto);
            }
            
            actualizarLista();
            calcularTotales();
        }
        
        function eliminarProducto(index) {
            productosSeleccionados.splice(index, 1);
            actualizarLista();
            calcularTotales();
        }
        
        function actualizarLista() {
            const listaDiv = document.getElementById('productos-lista');
            
            if (productosSeleccionados.length === 0) {
                listaDiv.innerHTML = '<p>No hay productos agregados</p>';
                return;
            }
            
            let html = '';
            productosSeleccionados.forEach((producto, index) => {
                const subtotal = producto.precio * producto.cantidad;
                html += `
                    <div class="producto-item">
                        <div class="producto-info">
                            <strong>${producto.nombre}</strong><br>
                            $${producto.precio.toFixed(2)} c/u
                        </div>
                        <div class="producto-cantidad">
                            Cantidad: ${producto.cantidad}
                        </div>
                        <div class="producto-precio">
                            $${subtotal.toFixed(2)}
                        </div>
                        <button class="btn-eliminar" onclick="eliminarProducto(${index})">Eliminar</button>
                    </div>
                `;
            });
            listaDiv.innerHTML = html;
        }
        
        function calcularTotales() {
            let subtotal = 0;
            productosSeleccionados.forEach(producto => {
                subtotal += producto.precio * producto.cantidad;
            });
            
            const iva = subtotal * {{ iva / 100 }};
            const total = subtotal + iva;
            
            document.getElementById('subtotal').innerText = subtotal.toFixed(2);
            document.getElementById('iva-total').innerText = iva.toFixed(2);
            document.getElementById('total').innerText = total.toFixed(2);
        }
        
        function crearFactura() {
            const clienteId = document.getElementById('cliente').value;
            
            if (!clienteId) {
                alert('Seleccione un cliente');
                return;
            }
            
            if (productosSeleccionados.length === 0) {
                alert('Agregue al menos un producto');
                return;
            }
            
            const productosEnviar = productosSeleccionados.map(p => ({
                id: p.id,
                cantidad: p.cantidad,
                precio: p.precio
            }));
            
            fetch(window.location.href, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    'cliente_id': clienteId,
                    'productos': JSON.stringify(productosEnviar)
                })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    alert(`Factura ${data.numero_factura} creada exitosamente`);
                    window.location.href = '/facturas';
                } else {
                    alert('Error: ' + data.error);
                }
            })
            .catch(error => {
                alert('Error al crear la factura: ' + error);
            });
        }
    </script>

    <footer>
        <p>Todos los derechos reservados 2025</p>
    </footer>
</body>
</html>
