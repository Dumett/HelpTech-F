{% extends "base.html" %}

{% block content %}
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Registro</h1>
        </div>
    </section>

    <!-- Register Form -->
    <section class="main-content">
        <div class="container">
            <div style="max-width: 400px; margin: 0 auto;">
                <form method="POST" action="{{ url_for('register') }}" style="display: flex; flex-direction: column; gap: 20px;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Nombre completo:</label>
                        <input type="text" name="name" value="{{ name if name else '' }}" class="form-control" placeholder="Tu nombre completo" required>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Email:</label>
                        <input type="email" name="email" value="{{ email if email else '' }}" class="form-control" placeholder="tu@ejemplo.com" required>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Empresa (Opcional):</label>
                        <input type="text" name="company" value="{{ company if company else '' }}" class="form-control" placeholder="Nombre de tu empresa">
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Contraseña:</label>
                        <input type="password" name="password" class="form-control" placeholder="Crea una contraseña segura" required>
                    </div>
                    
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: bold;">Confirmar contraseña:</label>
                        <input type="password" name="confirm_password" class="form-control" placeholder="Repite tu contraseña" required>
                    </div>
                    
                    <button type="submit" style="padding: 12px; background: #4DA6FF; color: #fff; border: none; border-radius: 3px; cursor: pointer; font-weight: bold;">REGISTRARSE</button>
                </form>
                <p style="text-align: center; margin-top: 20px;">
                    <a href="{{ url_for('login') }}" style="color: #4DA6FF; text-decoration: underline;">¿Ya tienes cuenta? Inicia sesión</a>
                </p>
            </div>
        </div>
    </section>
{% endblock %}
